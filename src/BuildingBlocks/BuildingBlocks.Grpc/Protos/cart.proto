syntax = "proto3";

option csharp_namespace = "BuildingBlocks.Grpc.Services";

package cart;

service CartGrpc {
  rpc GetCartByCustomerId(GetCartByIdRequest) returns (GetCartByIdResponse);
}

message GetCartByIdRequest {
  int64 customer_id = 1;
}

message CartItemDto {
  string variantId = 1;
  string productName = 3;
  string variantName = 4;
  string unitPrice = 5;
  int32 availableStocks = 6;
  int32 quantity = 7;
} 

message GetCartByIdResponse {
  int64 customer_id = 1;
  repeated CartItemDto items = 2;
}
