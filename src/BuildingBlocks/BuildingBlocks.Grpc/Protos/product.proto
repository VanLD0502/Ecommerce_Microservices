syntax = "proto3";

option csharp_namespace = "BuildingBlocks.Grpc.Services";

package product;

service ProductGrpc {
  rpc GetVariantById(GetVariantByIdRequest) returns (GetVariantByIdResponse);
//  rpc ValidateProducts(ValidateProductsRequest) returns (ValidateProductsResponse);
  rpc GetVariantsByIds(GetVariantsByIdsRequest) returns (GetVariantsByIdsResponse);
}


//
message  GetVariantByIdRequest {
  string id = 1;
}

message  GetVariantByIdResponse {
  string variantId = 1;
  int32 availableStocks = 2;
}

//
message GetVariantsByIdsRequest {
  repeated string variantIds = 1;
}
message GetVariantsByIdsResponse {
  repeated VariantGrpcDto Variants = 1;
}

message VariantGrpcDto {
  string variantId = 1;
  string productId = 2;
  string productName = 3;
  string variantName = 4;
  string unitPrice = 5;
  int32 availableStocks = 6;
}


