syntax = "proto3";

option csharp_namespace = "BuildingBlocks.Grpc.Services";

package product;

service ProductGrpc {
  rpc GetProductById(GetProductRequest) returns (ProductResponse);
}

message  GetProductRequest {
  string id = 1;
}

message  ProductResponse {
  string id = 1;
  string name = 2;
  double  price = 3;
}
