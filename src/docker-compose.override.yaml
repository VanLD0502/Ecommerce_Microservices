
services:
  product_db:
    container_name: ecommerce_product_db
    restart: always
    
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=ProductCatalogDb       
      - MYSQL_USER=db_user                
      - MYSQL_PASSWORD=123456            
    
    ports:
      - "3308:3306"
    volumes:
      - mysql_product_data:/var/lib/mysql
  
  cart_db:
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_cart_data:/data
    
    #lệnh này ghì đè lệnh khởi động mặc định của container 
    #-> ghi nhớ các lệnh trước đó để thực hiện lại, vì khi stop sẽ mất hết dữ liệu do lưu trên Ram.
    command: redis-server --appendonly yes


volumes:
  mysql_product_data:
    driver: local
    
  redis_cart_data:
    driver: local